name: Release

# Only version tags publish a release. Ordinary pushes never do.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create releases + upload assets

env:
  CARGO_TERM_COLOR: always

jobs:
  # Refuse to release unless the tag, Cargo.toml, and CHANGELOG all agree,
  # and the tag is greater than the previous one.
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need all tags for the non-decreasing check

      - name: Validate tag / version / changelog
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"       # e.g. v0.2.0
          VER="${TAG#v}"                 # e.g. 0.2.0
          CARGO_VER=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)

          if [ "$VER" != "$CARGO_VER" ]; then
            echo "::error::tag ($VER) does not match Cargo.toml version ($CARGO_VER)"; exit 1
          fi
          if ! grep -q "^## \[$VER\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$VER]' section"; exit 1
          fi
          PREV=$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1 || true)
          if [ -n "$PREV" ]; then
            HIGHEST=$(printf '%s\n%s\n' "$PREV" "$TAG" | sort -V | tail -1)
            if [ "$HIGHEST" != "$TAG" ]; then
              echo "::error::tag $TAG is not greater than previous tag $PREV"; exit 1
            fi
          fi
          echo "Guards passed for $TAG"

  build-linux:
    needs: guards
    runs-on: ubuntu-22.04 # glibc 2.35 floor, matches the TeamTalk SDK's ubuntu22 build
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/release/tt-spotify-bot tt-spotify-bot
          tar -czf dist/tt-spotify-bot-linux-x86_64.tar.gz tt-spotify-bot
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/tt-spotify-bot-linux-x86_64.tar.gz

  build-linux-arm64:
    needs: guards
    runs-on: ubuntu-22.04-arm # native aarch64 runner; SDK arm64 build floors at Debian 12 glibc
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/release/tt-spotify-bot tt-spotify-bot
          tar -czf dist/tt-spotify-bot-linux-aarch64.tar.gz tt-spotify-bot
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: dist/tt-spotify-bot-linux-aarch64.tar.gz

  build-windows:
    needs: guards
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Point bindgen at libclang
        shell: pwsh
        run: echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
      # NOTE: do not add an actions/cache step for wxWidgets here. Caches saved
      # by tag-triggered runs are scoped to that tag ref and are never restored
      # by later tags (only default-branch caches are shared), so in a tag-only
      # workflow it always misses and just adds minutes of cache upload.
      - name: Build
        run: cargo build --release
      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/tt-spotify-bot.exe tt-spotify-bot.exe
          Compress-Archive -Path tt-spotify-bot.exe -DestinationPath dist/tt-spotify-bot-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/tt-spotify-bot-windows-x86_64.zip

  release:
    needs: [build-linux, build-linux-arm64, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Collect binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble dist + checksums
        run: |
          mkdir -p dist
          cp artifacts/linux/* dist/
          cp artifacts/linux-arm64/* dist/
          cp artifacts/windows/* dist/
          cd dist && sha256sum * > SHA256SUMS && cd ..
          ls -la dist

      - name: Sign SHA256SUMS (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          set -e
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          # Passwordless key: feed an empty passphrase on stdin.
          minisign -S -s minisign.key -m dist/SHA256SUMS </dev/null
          rm -f minisign.key
          test -f dist/SHA256SUMS.minisig
          echo "Signed SHA256SUMS:"; cat dist/SHA256SUMS.minisig

      - name: Extract changelog section for this version
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # Literal (index) matching avoids awk's regex bracket-escaping pitfalls.
          awk -v tag="## [$VER]" '
            index($0, tag)==1 { f=1; next }
            index($0, "## [")==1 { f=0 }
            f
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "::error::empty release notes for $VER"; exit 1
          fi
          echo "----- release notes -----"; cat notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          # GitHub sorts release assets alphabetically; this list only controls
          # which files are uploaded, not their display order.
          files: |
            dist/tt-spotify-bot-windows-x86_64.zip
            dist/tt-spotify-bot-linux-x86_64.tar.gz
            dist/tt-spotify-bot-linux-aarch64.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.minisig
          fail_on_unmatched_files: true
